<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PROBE://AGENT — Threat Assessment Console</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════════════════════
   PROBE://AGENT — War Room Tactical Display
   ═══════════════════════════════════════════════════════════════ */

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0a0e14;
  --green: #00ff88;
  --cyan: #00aaff;
  --red: #ff3344;
  --amber: #ffcc00;
  --muted: #1a2233;
  --dim: #4a5568;
  --grid: rgba(0,170,255,0.06);
  --font-main: 'Share Tech Mono', monospace;
  --font-terminal: 'VT323', monospace;
}

html, body {
  width: 100%; height: 100%;
  background: var(--bg);
  color: var(--green);
  font-family: var(--font-main);
  overflow: hidden;
  cursor: default;
}

/* Tactical display frame */
#display {
  position: fixed; inset: 0;
  display: flex; align-items: center; justify-content: center;
}

#viewport {
  position: relative;
  width: 96vw; height: 94vh;
  max-width: 1400px;
  border: 1px solid rgba(0,170,255,0.2);
  overflow: hidden;
  background: var(--bg);
}

/* Grid overlay */
#viewport::before {
  content: '';
  position: absolute; inset: 0;
  background:
    linear-gradient(var(--grid) 1px, transparent 1px),
    linear-gradient(90deg, var(--grid) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
  z-index: 1;
  animation: gridPulse 8s ease-in-out infinite;
}

@keyframes gridPulse {
  0%, 100% { opacity: 0.5; }
  50% { opacity: 1; }
}

/* Canvas for effects */
#fx-canvas {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 500;
}

/* ─── SCREEN VIEWS ─── */
.screen-view {
  position: absolute; inset: 0;
  display: none;
  flex-direction: column;
  padding: 24px;
  z-index: 10;
}

.screen-view.active { display: flex; }

/* ─── TITLE SCREEN ─── */
#title-screen {
  align-items: center;
  justify-content: center;
  gap: 8px;
}

#title-logo {
  font-size: clamp(20px, 4vw, 48px);
  letter-spacing: 6px;
  color: var(--cyan);
  text-shadow: 0 0 20px rgba(0,170,255,0.4);
  margin-bottom: 4px;
}

#title-subtitle {
  font-size: clamp(10px, 1.4vw, 16px);
  letter-spacing: 8px;
  color: var(--dim);
  margin-bottom: 32px;
}

.title-form {
  display: flex;
  flex-direction: column;
  gap: 16px;
  width: min(500px, 85vw);
}

.form-row {
  display: flex;
  align-items: center;
  gap: 12px;
}

.form-row label {
  width: 140px;
  font-size: 11px;
  letter-spacing: 3px;
  color: var(--dim);
  text-align: right;
  flex-shrink: 0;
}

.form-row input {
  flex: 1;
  background: rgba(0,170,255,0.05);
  border: 1px solid rgba(0,170,255,0.2);
  color: var(--cyan);
  font-family: var(--font-main);
  font-size: 13px;
  padding: 10px 14px;
  outline: none;
  transition: border-color 0.2s;
}

.form-row input:focus {
  border-color: var(--cyan);
  box-shadow: 0 0 10px rgba(0,170,255,0.15);
}

.form-row input::placeholder { color: var(--dim); }

.selector-group {
  display: flex;
  gap: 6px;
  flex: 1;
}

.selector-btn {
  flex: 1;
  background: rgba(0,170,255,0.04);
  border: 1px solid rgba(0,170,255,0.15);
  color: var(--dim);
  font-family: var(--font-main);
  font-size: 11px;
  padding: 8px 6px;
  cursor: pointer;
  transition: all 0.15s;
  line-height: 1.4;
  text-align: center;
}

.selector-btn:hover {
  border-color: var(--cyan);
  color: var(--cyan);
}

.selector-btn.selected {
  border-color: var(--cyan);
  color: var(--cyan);
  background: rgba(0,170,255,0.1);
  box-shadow: 0 0 8px rgba(0,170,255,0.1);
}

#start-btn {
  margin-top: 24px;
  background: transparent;
  border: 1px solid var(--green);
  color: var(--green);
  font-family: var(--font-main);
  font-size: 14px;
  letter-spacing: 4px;
  padding: 14px 40px;
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
  overflow: hidden;
}

#start-btn:hover {
  background: rgba(0,255,136,0.08);
  box-shadow: 0 0 20px rgba(0,255,136,0.15);
}

#start-btn::before {
  content: '';
  position: absolute;
  top: 0; left: -100%;
  width: 100%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(0,255,136,0.1), transparent);
  animation: sweepBtn 3s linear infinite;
}

@keyframes sweepBtn {
  0% { left: -100%; }
  100% { left: 100%; }
}

.status-line {
  font-size: 11px;
  color: var(--dim);
  margin-top: 8px;
  letter-spacing: 2px;
}

.blink { animation: blink 1s step-end infinite; }
@keyframes blink { 50% { opacity: 0; } }

/* ─── BRIEFING SCREEN ─── */
#briefing-screen {
  align-items: center;
  justify-content: center;
  gap: 6px;
}

.briefing-line {
  font-size: 13px;
  letter-spacing: 2px;
  opacity: 0;
  transform: translateY(4px);
  transition: all 0.4s;
}

.briefing-line.visible {
  opacity: 1;
  transform: translateY(0);
}

.briefing-line.dim { color: var(--dim); font-size: 11px; }
.briefing-line.cyan { color: var(--cyan); }
.briefing-line.amber { color: var(--amber); }

.attack-roster {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  justify-content: center;
  margin: 12px 0;
  max-width: 600px;
}

.roster-item {
  font-size: 10px;
  letter-spacing: 1px;
  padding: 6px 12px;
  border: 1px solid;
  opacity: 0;
  transform: scale(0.8);
  transition: all 0.3s;
}

.roster-item.visible {
  opacity: 1;
  transform: scale(1);
}

/* ─── BATTLE SCREEN (Defense Grid) ─── */
#battle-screen { padding: 0; }

.battle-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 16px;
  border-bottom: 1px solid var(--muted);
  font-size: 11px;
  letter-spacing: 2px;
}

.battle-progress { color: var(--dim); }
.battle-category { color: var(--cyan); text-shadow: 0 0 6px rgba(0,170,255,0.4); }
.battle-time { color: var(--dim); }

.battle-main {
  flex: 1;
  display: flex;
  overflow: hidden;
}

/* Defense grid */
.defense-grid {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  position: relative;
  padding: 16px;
  overflow: hidden;
}

.sector-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  width: min(420px, 50vw);
  margin-bottom: 20px;
}

.sector-node {
  aspect-ratio: 1.4;
  border: 1px solid rgba(0,255,136,0.3);
  background: rgba(0,255,136,0.03);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 4px;
  padding: 6px;
  transition: all 0.4s;
  position: relative;
  overflow: hidden;
}

.sector-node::before {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(180deg, rgba(0,255,136,0.05) 0%, transparent 100%);
  transition: all 0.4s;
}

.sector-node .sector-icon { font-size: 18px; z-index: 1; }
.sector-node .sector-label {
  font-size: 8px;
  letter-spacing: 1px;
  color: var(--green);
  z-index: 1;
  text-align: center;
}

.sector-node .sector-status {
  font-size: 7px;
  letter-spacing: 1px;
  color: var(--dim);
  z-index: 1;
}

.sector-node .sector-bar {
  width: 80%;
  height: 3px;
  background: rgba(0,255,136,0.15);
  z-index: 1;
  overflow: hidden;
}

.sector-node .sector-bar-fill {
  height: 100%;
  width: 0%;
  background: var(--green);
  transition: width 0.3s;
}

.sector-node.active {
  border-color: var(--cyan);
  background: rgba(0,170,255,0.06);
  box-shadow: 0 0 12px rgba(0,170,255,0.1);
}

.sector-node.active::before {
  background: linear-gradient(180deg, rgba(0,170,255,0.08) 0%, transparent 100%);
}

.sector-node.active .sector-label { color: var(--cyan); }

.sector-node.breached {
  border-color: var(--red);
  background: rgba(255,51,68,0.06);
}

.sector-node.breached::before {
  background: linear-gradient(180deg, rgba(255,51,68,0.08) 0%, transparent 100%);
}

.sector-node.breached .sector-label { color: var(--red); }
.sector-node.breached .sector-bar-fill { background: var(--red); }

.sector-node.secure {
  border-color: var(--green);
}

.sector-node.secure .sector-status { color: var(--green); }

/* Outcome callout */
.outcome-text {
  font-size: 18px;
  letter-spacing: 4px;
  font-weight: bold;
  opacity: 0;
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0.5);
  transition: all 0.3s;
  z-index: 100;
  pointer-events: none;
}

.outcome-text.show {
  opacity: 1;
  transform: translate(-50%, -50%) scale(1);
}

.outcome-text.succeeded {
  color: var(--red);
  text-shadow: 0 0 20px var(--red), 0 0 40px rgba(255,51,68,0.4);
}

.outcome-text.failed {
  color: var(--green);
  text-shadow: 0 0 12px var(--green);
}

.outcome-text.error {
  color: var(--amber);
  text-shadow: 0 0 12px var(--amber);
}

/* Current attack info */
.current-attack {
  font-size: 10px;
  letter-spacing: 2px;
  color: var(--dim);
  text-align: center;
  min-height: 20px;
}

.current-attack .attack-name { color: var(--cyan); }

/* Terminal log panel */
.terminal-panel {
  width: 340px;
  border-left: 1px solid var(--muted);
  display: flex;
  flex-direction: column;
  font-family: var(--font-terminal);
  font-size: 14px;
}

.terminal-header {
  padding: 8px 10px;
  border-bottom: 1px solid var(--muted);
  font-family: var(--font-main);
  font-size: 10px;
  color: var(--dim);
  letter-spacing: 3px;
}

.terminal-log {
  flex: 1;
  overflow-y: auto;
  padding: 8px 10px;
  line-height: 1.4;
}

.terminal-log::-webkit-scrollbar { width: 3px; }
.terminal-log::-webkit-scrollbar-track { background: var(--bg); }
.terminal-log::-webkit-scrollbar-thumb { background: var(--muted); }

.log-entry { margin-bottom: 4px; word-break: break-all; }
.log-prompt { color: var(--cyan); }
.log-response { color: var(--dim); }
.log-result-success { color: var(--red); }
.log-result-fail { color: var(--green); }
.log-result-error { color: var(--amber); }
.log-category {
  color: var(--cyan);
  font-family: var(--font-main);
  font-size: 10px;
  letter-spacing: 1px;
  margin-top: 6px;
  display: block;
}

/* ─── GRADE REVEAL SCREEN ─── */
#reveal-screen {
  align-items: center;
  justify-content: center;
  gap: 16px;
}

.grade-text {
  font-size: clamp(20px, 4vw, 48px);
  letter-spacing: 6px;
  opacity: 0;
  transform: scale(2);
  transition: all 0.5s cubic-bezier(0.17, 0.89, 0.32, 1.28);
}

.grade-text.slam {
  opacity: 1;
  transform: scale(1);
}

.grade-safe {
  color: var(--green);
  text-shadow: 0 0 20px var(--green), 0 0 60px rgba(0,255,136,0.3);
}

.grade-atrisk {
  color: var(--amber);
  text-shadow: 0 0 20px var(--amber), 0 0 60px rgba(255,204,0,0.3);
}

.grade-compromised {
  color: var(--red);
  text-shadow: 0 0 20px var(--red), 0 0 60px rgba(255,51,68,0.3);
}

.grade-subtitle {
  font-size: clamp(10px, 1.5vw, 16px);
  letter-spacing: 4px;
  color: var(--dim);
  opacity: 0;
  transition: opacity 0.5s;
}

.grade-subtitle.visible { opacity: 1; }

.grade-stats {
  font-size: 12px;
  color: var(--dim);
  opacity: 0;
  transition: opacity 0.5s;
  text-align: center;
  line-height: 2;
}

.grade-stats.visible { opacity: 1; }

.grade-icon {
  font-size: clamp(36px, 8vw, 72px);
  opacity: 0;
  transition: opacity 0.5s;
}

.grade-icon.visible { opacity: 1; }

#continue-btn {
  margin-top: 20px;
  background: transparent;
  border: 1px solid var(--dim);
  color: var(--dim);
  font-family: var(--font-main);
  font-size: 11px;
  letter-spacing: 2px;
  padding: 10px 24px;
  cursor: pointer;
  opacity: 0;
  transition: all 0.3s;
}

#continue-btn.visible { opacity: 1; }

#continue-btn:hover {
  border-color: var(--cyan);
  color: var(--cyan);
}

/* ─── RESULTS SCREEN ─── */
#results-screen {
  padding: 16px;
  overflow-y: auto;
}

.results-header {
  font-size: 16px;
  letter-spacing: 4px;
  text-align: center;
  margin-bottom: 16px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--muted);
}

.results-list {
  display: flex;
  flex-direction: column;
  gap: 3px;
  margin-bottom: 16px;
}

.result-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 10px;
  border: 1px solid var(--muted);
  font-size: 11px;
  cursor: pointer;
  transition: all 0.1s;
}

.result-row:hover {
  border-color: rgba(0,170,255,0.3);
  background: rgba(0,170,255,0.03);
}

.result-icon { font-size: 14px; width: 24px; text-align: center; }
.result-name { flex: 1; color: var(--dim); }
.result-strategy { color: var(--dim); flex: 1; font-size: 10px; }
.result-outcome { width: 80px; text-align: center; letter-spacing: 1px; }
.result-outcome.succeeded { color: var(--red); }
.result-outcome.failed { color: var(--green); }
.result-outcome.error { color: var(--amber); }

.result-severity {
  width: 60px;
  text-align: center;
  font-size: 9px;
  padding: 2px 4px;
  border: 1px solid;
  letter-spacing: 1px;
}

.sev-critical { border-color: var(--red); color: var(--red); }
.sev-high { border-color: #ff6600; color: #ff6600; }
.sev-medium { border-color: var(--amber); color: var(--amber); }
.sev-low { border-color: var(--green); color: var(--green); }

.result-detail {
  display: none;
  padding: 8px 10px;
  border: 1px solid var(--muted);
  border-top: none;
  font-family: var(--font-terminal);
  font-size: 14px;
  line-height: 1.4;
  max-height: 200px;
  overflow-y: auto;
  background: rgba(0,0,0,0.4);
}

.result-detail.open { display: block; }

.result-detail .turn-attacker { color: var(--cyan); }
.result-detail .turn-target { color: var(--dim); }
.result-detail .rationale { color: var(--amber); margin-top: 6px; font-style: italic; }

.results-actions {
  display: flex;
  gap: 8px;
  justify-content: center;
  margin: 16px 0;
}

.action-btn {
  background: transparent;
  border: 1px solid var(--muted);
  color: var(--dim);
  font-family: var(--font-main);
  font-size: 10px;
  letter-spacing: 1px;
  padding: 8px 16px;
  cursor: pointer;
  transition: all 0.15s;
}

.action-btn:hover {
  border-color: var(--cyan);
  color: var(--cyan);
}

.results-footer {
  text-align: center;
  font-size: 10px;
  color: rgba(0,170,255,0.2);
  padding-top: 12px;
  border-top: 1px solid var(--muted);
  letter-spacing: 2px;
}

/* ─── Animations ─── */
@keyframes shake-sm {
  0%, 100% { transform: translate(0); }
  25% { transform: translate(-2px, 1px); }
  50% { transform: translate(2px, -1px); }
  75% { transform: translate(-1px, 2px); }
}

@keyframes shake-lg {
  0%, 100% { transform: translate(0); }
  10% { transform: translate(-4px, 2px); }
  20% { transform: translate(4px, -3px); }
  30% { transform: translate(-3px, 4px); }
  40% { transform: translate(3px, -2px); }
  50% { transform: translate(-2px, 3px); }
}

.shake-sm { animation: shake-sm 0.2s ease-in-out; }
.shake-lg { animation: shake-lg 0.4s ease-in-out; }

/* Screen flash */
.screen-flash {
  position: absolute; inset: 0;
  background: white;
  opacity: 0;
  pointer-events: none;
  z-index: 900;
  transition: opacity 0.05s;
}

.screen-flash.flash { opacity: 0.1; }

/* Red pulse for compromised */
@keyframes redPulse {
  0%, 100% { box-shadow: inset 0 0 30px rgba(255,51,68,0.1); }
  50% { box-shadow: inset 0 0 60px rgba(255,51,68,0.2); }
}

.red-pulse { animation: redPulse 2s ease-in-out infinite; }

/* Radar sweep for briefing/results */
@keyframes radarSweep {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}
</style>
</head>
<body>

<div id="display">
  <div id="viewport">
    <canvas id="fx-canvas"></canvas>
    <div class="screen-flash" id="flash"></div>

    <!-- ═══ TITLE SCREEN ═══ -->
    <div id="title-screen" class="screen-view active">
      <div id="title-logo">PROBE://AGENT</div>
      <div id="title-subtitle">THREAT ASSESSMENT CONSOLE</div>

      <div class="title-form">
        <div class="form-row">
          <label>TARGET DESIGNATION</label>
          <input type="text" id="target-url" placeholder="http://target-url/api" autofocus>
        </div>

        <div class="form-row">
          <label>THREAT LEVEL</label>
          <div class="selector-group" id="profile-sel">
            <button class="selector-btn selected" data-val="quick">DEFCON 5<br><span style="font-size:9px;color:var(--dim)">QUICK</span></button>
            <button class="selector-btn" data-val="standard">DEFCON 3<br><span style="font-size:9px;color:var(--dim)">STANDARD</span></button>
            <button class="selector-btn" data-val="thorough">DEFCON 1<br><span style="font-size:9px;color:var(--dim)">THOROUGH</span></button>
          </div>
        </div>

        <div class="form-row">
          <label>TARGET PROTOCOL</label>
          <div class="selector-group" id="type-sel">
            <button class="selector-btn selected" data-val="http">HTTP</button>
            <button class="selector-btn" data-val="openclaw">OPENCLAW</button>
          </div>
        </div>
      </div>

      <button id="start-btn">INITIATE SCAN</button>
      <div class="status-line">
        <span class="blink">_</span> AWAITING TARGET DESIGNATION
      </div>
    </div>

    <!-- ═══ BRIEFING SCREEN ═══ -->
    <div id="briefing-screen" class="screen-view">
      <div class="briefing-line" id="b-line-1">ESTABLISHING CONNECTION...</div>
      <div class="briefing-line dim" id="b-line-2"></div>
      <div class="briefing-line cyan" id="b-line-3"></div>
      <div class="briefing-line amber" id="b-line-4">LOADING THREAT VECTORS...</div>
      <div class="attack-roster" id="attack-roster"></div>
      <div class="briefing-line" id="b-line-5" style="margin-top:16px">DEPLOYING PROBES...</div>
    </div>

    <!-- ═══ BATTLE SCREEN (Defense Grid) ═══ -->
    <div id="battle-screen" class="screen-view">
      <div class="battle-top">
        <div class="battle-progress" id="battle-progress">PROBE 0/0</div>
        <div class="battle-category" id="battle-category">INITIALIZING</div>
        <div class="battle-time" id="battle-time">00:00</div>
      </div>

      <div class="battle-main">
        <div class="defense-grid" id="defense-grid">
          <div class="sector-grid" id="sector-grid"></div>
          <div class="outcome-text" id="outcome-text"></div>
          <div class="current-attack" id="current-attack">&nbsp;</div>
        </div>

        <div class="terminal-panel">
          <div class="terminal-header">INTERCEPT LOG</div>
          <div class="terminal-log" id="terminal-log"></div>
        </div>
      </div>
    </div>

    <!-- ═══ GRADE REVEAL ═══ -->
    <div id="reveal-screen" class="screen-view">
      <div class="grade-icon" id="grade-icon"></div>
      <div class="grade-text" id="grade-text"></div>
      <div class="grade-subtitle" id="grade-subtitle"></div>
      <div class="grade-stats" id="grade-stats"></div>
      <button id="continue-btn">VIEW FULL REPORT</button>
    </div>

    <!-- ═══ RESULTS SCREEN ═══ -->
    <div id="results-screen" class="screen-view">
      <div class="results-header" id="results-header">TACTICAL ASSESSMENT</div>
      <div class="results-list" id="results-list"></div>
      <div class="results-actions">
        <button class="action-btn" id="btn-export-json">EXPORT JSON</button>
        <button class="action-btn" id="btn-export-md">EXPORT REPORT</button>
        <button class="action-btn" id="btn-run-again">NEW SCAN</button>
      </div>
      <div class="results-footer">PROBE://AGENT v0.1</div>
    </div>
  </div>
</div>

<script>
/* ═══════════════════════════════════════════════════════════════
   TACTICAL DISPLAY ENGINE
   ═══════════════════════════════════════════════════════════════ */

// ─── Particles ───
let particles = [];

function spawnParticles(x, y, count, color) {
  for (let i = 0; i < count; i++) {
    particles.push({
      x, y,
      vx: (Math.random() - 0.5) * 6,
      vy: (Math.random() - 0.5) * 6,
      life: 1,
      decay: 0.02 + Math.random() * 0.02,
      size: 1 + Math.random() * 2,
      color,
    });
  }
}

function updateParticles() {
  ctx.clearRect(0, 0, fxCanvas.width, fxCanvas.height);
  particles = particles.filter(p => p.life > 0);
  for (const p of particles) {
    p.x += p.vx;
    p.y += p.vy;
    p.vx *= 0.98;
    p.vy *= 0.98;
    p.life -= p.decay;
    ctx.globalAlpha = p.life * 0.8;
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x, p.y, p.size, p.size);
  }
  ctx.globalAlpha = 1;
  requestAnimationFrame(updateParticles);
}
updateParticles();

// ─── Audio (Web Audio API) ───
let audioCtx = null;

function initAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

function playBeep(freq, duration, type = 'sine', vol = 0.06) {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type;
  osc.frequency.value = freq;
  gain.gain.setValueAtTime(vol, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
  osc.connect(gain).connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + duration);
}

function playNoise(duration, vol = 0.04) {
  if (!audioCtx) return;
  const bufferSize = audioCtx.sampleRate * duration;
  const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
  const src = audioCtx.createBufferSource();
  const gain = audioCtx.createGain();
  src.buffer = buffer;
  gain.gain.setValueAtTime(vol, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
  src.connect(gain).connect(audioCtx.destination);
  src.start();
}

// Radar ping — short clean tone
function sfxRadarPing() {
  playBeep(1200, 0.08, 'sine', 0.04);
  setTimeout(() => playBeep(800, 0.12, 'sine', 0.02), 80);
}

// Confirmation tone — low reassuring double beep
function sfxDefenseHeld() {
  playBeep(600, 0.1, 'sine', 0.04);
  setTimeout(() => playBeep(800, 0.1, 'sine', 0.04), 100);
}

// Alert klaxon — breach detected
function sfxBreach() {
  playNoise(0.1, 0.06);
  playBeep(120, 0.25, 'sawtooth', 0.05);
  setTimeout(() => playBeep(160, 0.2, 'sawtooth', 0.04), 150);
}

function sfxError() {
  playBeep(200, 0.05); setTimeout(() => playBeep(600, 0.05), 40);
}

function sfxDrumRoll(cb) {
  let i = 0;
  const iv = setInterval(() => {
    playNoise(0.03, 0.03 + i * 0.002);
    i++;
    if (i > 24) { clearInterval(iv); if (cb) cb(); }
  }, 50);
}

function sfxSecure() {
  [523, 659, 784, 1047].forEach((f, i) => {
    setTimeout(() => playBeep(f, 0.25, 'sine', 0.04), i * 100);
  });
}

function sfxAlarm() {
  let i = 0;
  const iv = setInterval(() => {
    playBeep(i % 2 === 0 ? 200 : 160, 0.15, 'sawtooth', 0.06);
    i++;
    if (i > 8) clearInterval(iv);
  }, 180);
}

function sfxCaution() {
  [440, 0, 440, 0, 440].forEach((f, i) => {
    if (f) setTimeout(() => playBeep(f, 0.1, 'triangle', 0.04), i * 140);
  });
}

// ─── Start Mission ───
$('start-btn').addEventListener('click', startMission);
$('target-url').addEventListener('keydown', e => { if (e.key === 'Enter') startMission(); });

async function startMission() {
  const url = $('target-url').value.trim();
  if (!url) { $('target-url').style.borderColor = 'var(--red)'; return; }
  $('target-url').style.borderColor = '';

  initAudio();
  sfxRadarPing();

  const profile = document.querySelector('#profile-sel .selected').dataset.val;
  const targetType = document.querySelector('#type-sel .selected').dataset.val;

  // Start scan on server
  try {
    const resp = await fetch('/api/start', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ url, profile, target_type: targetType }),
    });
    const data = await resp.json();
    S.sessionId = data.session_id;
  } catch (e) {
    alert('Failed to start scan: ' + e.message);
    return;
  }

  // Connect WebSocket
  const wsProto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  S.ws = new WebSocket(`${wsProto}//${location.host}/ws/${S.sessionId}`);
  S.ws.onmessage = e => handleEvent(JSON.parse(e.data));
  S.ws.onerror = () => console.error('WebSocket error');

  showScreen('briefing');
  runBriefing(url);
}

// ─── Battle (Defense Grid) ───
function initBattle(attacks, total) {
  S.totalAttacks = total;
  S.attackIndex = 0;
  S.successes = 0;
  S.categoryOrder = attacks.map(a => a.name);
  S.categoryProgress = {};
  S.sectorBreaches = {};

  // Build sector grid
  const grid = $('sector-grid');
  grid.innerHTML = '';

  // Adjust grid columns based on attack count
  const cols = attacks.length <= 4 ? 2 : attacks.length <= 6 ? 3 : 3;
  grid.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;

  attacks.forEach(atk => {
    const meta = CAT_META[atk.name] || { icon: '?', color: '#666', label: atk.name };
    S.categoryProgress[atk.name] = { done: 0, total: atk.strategy_count, breached: 0 };
    S.sectorBreaches[atk.name] = false;

    const node = document.createElement('div');
    node.className = 'sector-node';
    node.id = `sector-${atk.name}`;
    node.innerHTML =
      `<span class="sector-icon">${meta.icon}</span>` +
      `<span class="sector-label">${meta.label}</span>` +
      `<span class="sector-status">STANDBY</span>` +
      `<div class="sector-bar"><div class="sector-bar-fill" id="bar-${atk.name}"></div></div>`;
    grid.appendChild(node);
  });

  // Timer
  S.startTime = Date.now();
  if (S.timerInterval) clearInterval(S.timerInterval);
  S.timerInterval = setInterval(updateTimer, 1000);

  // Clear terminal
  $('terminal-log').innerHTML = '';
}

function updateTimer() {
  const elapsed = Math.floor((Date.now() - S.startTime) / 1000);
  const m = String(Math.floor(elapsed / 60)).padStart(2, '0');
  const s = String(elapsed % 60).padStart(2, '0');
  $('battle-time').textContent = `${m}:${s}`;
}

function updateSectorBar(category) {
  const prog = S.categoryProgress[category];
  if (!prog) return;
  const bar = document.getElementById(`bar-${category}`);
  if (bar) {
    bar.style.width = `${(prog.done / prog.total) * 100}%`;
  }
}

function setSectorActive(category) {
  // Remove active from all
  document.querySelectorAll('.sector-node').forEach(n => n.classList.remove('active'));
  const node = document.getElementById(`sector-${category}`);
  if (node) {
    node.classList.add('active');
    const statusEl = node.querySelector('.sector-status');
    if (statusEl) statusEl.textContent = 'SCANNING';
  }
}

function setSectorBreached(category) {
  const node = document.getElementById(`sector-${category}`);
  if (node) {
    node.classList.add('breached');
    const statusEl = node.querySelector('.sector-status');
    if (statusEl) statusEl.textContent = 'BREACHED';
  }
  S.sectorBreaches[category] = true;
}

function setSectorSecure(category) {
  const prog = S.categoryProgress[category];
  if (!prog || prog.done < prog.total) return;
  if (S.sectorBreaches[category]) return; // Already breached
  const node = document.getElementById(`sector-${category}`);
  if (node) {
    node.classList.add('secure');
    node.classList.remove('active');
    const statusEl = node.querySelector('.sector-status');
    if (statusEl) statusEl.textContent = 'SECURE';
  }
}

function addTerminalLog(html) {
  const log = $('terminal-log');
  const div = document.createElement('div');
  div.className = 'log-entry';
  div.innerHTML = html;
  log.appendChild(div);
  log.scrollTop = log.scrollHeight;
}

async function animateAttack(data) {
  const meta = CAT_META[data.category] || { icon: '?', color: '#0f0', label: data.category };

  $('battle-progress').textContent = `PROBE ${data.index}/${data.total}`;
  $('battle-category').textContent = meta.label;
  $('battle-category').style.color = meta.color;
  $('battle-category').style.textShadow = `0 0 8px ${meta.color}`;

  setSectorActive(data.category);

  $('current-attack').innerHTML =
    `<span class="attack-name">${data.strategy.replace(/_/g, ' ').toUpperCase()}</span>`;

  sfxRadarPing();

  addTerminalLog(`<span class="log-category">${meta.icon} ${meta.label} / ${data.strategy}</span>`);
}

async function animateResult(data) {
  const outcomeEl = $('outcome-text');
  const cat = data.category;
  const meta = CAT_META[cat] || { color: '#0f0' };

  // Update progress
  if (S.categoryProgress[cat]) {
    S.categoryProgress[cat].done++;
    updateSectorBar(cat);
  }

  if (data.outcome === 'succeeded') {
    S.successes++;
    if (S.categoryProgress[cat]) S.categoryProgress[cat].breached++;
    outcomeEl.textContent = 'SECTOR BREACH';
    outcomeEl.className = 'outcome-text succeeded show';
    shakeScreen(data.severity === 'critical');
    flashScreen();
    sfxBreach();
    setSectorBreached(cat);

    // Particles at sector node
    const node = document.getElementById(`sector-${cat}`);
    if (node) {
      const rect = node.getBoundingClientRect();
      const canvasRect = fxCanvas.getBoundingClientRect();
      spawnParticles(
        rect.left - canvasRect.left + rect.width / 2,
        rect.top - canvasRect.top + rect.height / 2,
        12, meta.color
      );
    }

    addTerminalLog(`<span class="log-result-success">\u2718 BREACH \u2014 ${data.rationale.substring(0, 120)}</span>`);
  } else if (data.outcome === 'failed') {
    outcomeEl.textContent = 'DEFENSE HELD';
    outcomeEl.className = 'outcome-text failed show';
    sfxDefenseHeld();
    addTerminalLog(`<span class="log-result-fail">\u2714 DEFENSE HELD</span>`);
  } else {
    outcomeEl.textContent = 'ERROR';
    outcomeEl.className = 'outcome-text error show';
    sfxError();
    addTerminalLog(`<span class="log-result-error">\u26A0 ERROR</span>`);
  }

  // Add transcript preview
  if (data.transcript_preview) {
    const lines = data.transcript_preview.split('\n').filter(l => l.trim());
    for (const line of lines.slice(0, 2)) {
      const cls = line.startsWith('>') ? 'log-prompt' : 'log-response';
      addTerminalLog(`<span class="${cls}">${escHtml(line.substring(0, 150))}</span>`);
    }
  }

  await sleep(800);
  outcomeEl.classList.remove('show');
  await sleep(200);
}

// ─── Grade Reveal ───
async function showGradeReveal(grade, summary) {
  if (S.timerInterval) clearInterval(S.timerInterval);
  showScreen('reveal');

  // Dark pause
  await sleep(1000);

  // Drum roll
  sfxDrumRoll();
  await sleep(1500);

  // Grade text + subtitle mapping
  let gradeDisplay, gradeClass, subtitle;
  if (grade === 'Safe') {
    gradeDisplay = 'ALL SECTORS SECURE';
    gradeClass = 'grade-safe';
    subtitle = 'NO BREACHES DETECTED';
  } else if (grade === 'At Risk') {
    gradeDisplay = 'PERIMETER BREACH';
    gradeClass = 'grade-atrisk';
    subtitle = 'PARTIAL DEFENSE FAILURE';
  } else {
    gradeDisplay = 'FACILITY COMPROMISED';
    gradeClass = 'grade-compromised';
    subtitle = 'CRITICAL DEFENSE FAILURE';
    viewport.classList.add('red-pulse');
  }

  // Text scramble effect
  const gradeEl = $('grade-text');
  const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';

  gradeEl.className = `grade-text ${gradeClass}`;
  let scrambleCount = 0;
  const scrambleIv = setInterval(() => {
    let text = '';
    for (let i = 0; i < gradeDisplay.length; i++) {
      if (gradeDisplay[i] === ' ') {
        text += ' ';
      } else if (scrambleCount > 8 + i * 1.5) {
        text += gradeDisplay[i];
      } else {
        text += chars[Math.floor(Math.random() * chars.length)];
      }
    }
    gradeEl.textContent = text;
    gradeEl.classList.add('slam');
    scrambleCount++;
    if (scrambleCount > 8 + gradeDisplay.length * 1.5 + 4) {
      clearInterval(scrambleIv);
      gradeEl.textContent = gradeDisplay;
    }
  }, 40);

  await sleep(600);

  // Grade-specific effects
  const iconEl = $('grade-icon');
  if (grade === 'Safe') {
    iconEl.textContent = '\u{1F6E1}\uFE0F';
    sfxSecure();
    for (let i = 0; i < 3; i++) {
      setTimeout(() => {
        spawnParticles(
          fxCanvas.width / 2 + (Math.random() - 0.5) * 200,
          fxCanvas.height / 2,
          8, '#00ff88'
        );
      }, i * 200);
    }
  } else if (grade === 'At Risk') {
    iconEl.textContent = '\u{26A0}\uFE0F';
    sfxCaution();
  } else {
    iconEl.textContent = '\u{1F6A8}';
    sfxAlarm();
    shakeScreen(true);
    flashScreen();
  }

  await sleep(400);
  iconEl.classList.add('visible');

  // Subtitle
  await sleep(300);
  const subtitleEl = $('grade-subtitle');
  subtitleEl.textContent = subtitle;
  subtitleEl.classList.add('visible');

  await sleep(400);
  const statsEl = $('grade-stats');
  const total = summary.total || 0;
  const succeeded = summary.succeeded || 0;
  const highSev = summary.highest_severity ? summary.highest_severity.toUpperCase() : 'NONE';
  statsEl.innerHTML =
    `${succeeded}/${total} PROBES SUCCEEDED<br>` +
    `HIGHEST SEVERITY: ${highSev}`;
  statsEl.classList.add('visible');

  await sleep(500);
  $('continue-btn').classList.add('visible');
}

// ─── Results ───
function showResults() {
  showScreen('results');
  const list = $('results-list');
  list.innerHTML = '';

  const gradeColors = { 'Safe': 'var(--green)', 'At Risk': 'var(--amber)', 'Compromised': 'var(--red)' };
  $('results-header').innerHTML =
    `TACTICAL ASSESSMENT \u2014 <span style="color:${gradeColors[S.grade] || '#fff'}">${S.grade?.toUpperCase()}</span>`;

  if (!S.results) return;

  S.results.forEach((r, idx) => {
    const meta = CAT_META[r.attack_name] || { icon: '?', color: '#666' };
    const outcomeClass = r.outcome;

    const row = document.createElement('div');
    row.className = 'result-row';
    row.innerHTML =
      `<span class="result-icon">${meta.icon}</span>` +
      `<span class="result-name">${r.attack_name.replace(/_/g, ' ')}</span>` +
      `<span class="result-strategy">${r.strategy}</span>` +
      `<span class="result-outcome ${outcomeClass}">${r.outcome.toUpperCase()}</span>` +
      `<span class="result-severity sev-${r.severity}">${r.severity.toUpperCase()}</span>`;

    // Detail panel
    const detail = document.createElement('div');
    detail.className = 'result-detail';
    detail.id = `detail-${idx}`;

    let detailHtml = '';
    if (r.turns && r.turns.length) {
      for (const t of r.turns) {
        const cls = t.role === 'attacker' ? 'turn-attacker' : 'turn-target';
        const prefix = t.role === 'attacker' ? '\u25B6' : '\u25C0';
        const content = t.content.length > 500 ? t.content.substring(0, 500) + '...' : t.content;
        detailHtml += `<div class="${cls}">${prefix} ${escHtml(content)}</div>`;
      }
    }
    if (r.rationale) {
      detailHtml += `<div class="rationale">\u2699 ${escHtml(r.rationale)}</div>`;
    }
    detail.innerHTML = detailHtml;

    row.addEventListener('click', () => {
      detail.classList.toggle('open');
      playBeep(500, 0.04, 'sine', 0.03);
    });

    list.appendChild(row);
    list.appendChild(detail);
  });
}

function downloadBlob(blob, filename) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
  URL.revokeObjectURL(a.href);
}

// ─── WebSocket event handler ───
async function handleEvent(evt) {
  switch (evt.type) {
    case 'connected':
      $('b-line-3').textContent = `FORMAT: ${evt.format} \u2014 LATENCY: ${evt.latency_ms}ms`;
      $('b-line-3').classList.add('visible');
      break;

    case 'mission_brief':
      showRoster(evt.attacks);
      const rosterDelay = evt.attacks.length * 150 + 1200;
      setTimeout(() => initBattle(evt.attacks, evt.total_strategies), rosterDelay);
      break;

    case 'attack_start':
      S.attackIndex = evt.index;
      await animateAttack(evt);
      break;

    case 'attack_result':
      await animateResult(evt);
      break;

    case 'category_done':
      // Mark sector as secure if no breaches
      setSectorSecure(evt.name || evt.display_name?.toLowerCase().replace(/ /g, '_'));
      addTerminalLog(
        `<span class="log-category">\u2500\u2500 ${evt.display_name}: ${evt.succeeded}/${evt.total} breached \u2500\u2500</span>`
      );
      break;

    case 'scan_complete':
      S.grade = evt.grade;
      S.summary = evt.summary;
      S.results = evt.results || [];
      S.scanData = evt;
      await sleep(500);
      await showGradeReveal(evt.grade, evt.summary || {});
      break;

    case 'error':
      addTerminalLog(`<span class="log-result-error">ERROR: ${escHtml(evt.message)}</span>`);
      break;
  }
}

// ─── Utilities ───
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

function escHtml(s) {
  if (!s) return '';
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

// ─── URL pre-fill from query params ───
const urlParams = new URLSearchParams(window.location.search);
if (urlParams.get('target')) {
  $('target-url').value = urlParams.get('target');
}
if (urlParams.get('profile')) {
  document.querySelectorAll('#profile-sel .selector-btn').forEach(b => {
    b.classList.toggle('selected', b.dataset.val === urlParams.get('profile'));
  });
}
if (urlParams.get('type')) {
  document.querySelectorAll('#type-sel .selector-btn').forEach(b => {
    b.classList.toggle('selected', b.dataset.val === urlParams.get('type'));
  });
}
if (urlParams.get('autostart') === '1' && urlParams.get('target')) {
  setTimeout(startMission, 500);
}
</script>
